<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Gaiden — Your story in gaming</title>
    <meta name="description" content="The ultimate open-source gaming time tracker.">
    <meta property="og:title" content="Gaming Gaiden — Your story in gaming">
    <meta property="og:description" content="The ultimate open-source gaming time tracker.">
    <meta property="og:image" content="resources/banner.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/x-icon" href="resources/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="resources/style.css">
</head>
<body>

<div class="page">

    <header class="site-header">
        <img src="resources/banner.png" alt="Gaming Gaiden" class="brand-banner">
        <p class="site-tagline" id="site-tagline">The ultimate open-source gaming time tracker.</p>
        <div class="shield-row" id="shield-row" aria-label="Repository stats"></div>
    </header>

    <!-- Main 2×2 grid: features | carousel (row 1); download | caption (row 2) -->
    <div class="site-main">

        <section class="info-features" aria-labelledby="features-eyebrow">
            <p class="eyebrow" id="features-eyebrow">Features</p>
            <ul class="feature-list" id="feature-list"></ul>
        </section>

        <div class="slide-stage" data-landing-carousel role="region" aria-label="Feature screenshots">
            <div class="slide-frame" id="slide-frame"></div>
            <button type="button" class="nav-btn nav-btn--overlay nav-btn--prev" id="slide-prev" aria-label="Previous">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button type="button" class="nav-btn nav-btn--overlay nav-btn--next" id="slide-next" aria-label="Next">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <div class="info-actions" role="group" aria-label="Download and repository">
            <a href="https://github.com/kulvind3r/GamingGaiden/releases/latest"
               class="btn-download" target="_blank" rel="noopener">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download For Windows
            </a>
            <a href="https://github.com/kulvind3r/GamingGaiden" target="_blank" rel="noopener" class="github-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                kulvind3r/GamingGaiden
            </a>
        </div>

        <div class="carousel-caption" data-landing-carousel>
            <div class="slide-dots-row">
                <div class="nav-dots" id="nav-dots" role="tablist"></div>
            </div>
            <div class="slide-meta" aria-live="polite">
                <p class="slide-title" id="slide-title"></p>
                <p class="slide-desc" id="slide-desc"></p>
            </div>
        </div>

    </div>

</div>

<script src="resources/script.js"></script>
</body>
</html>
